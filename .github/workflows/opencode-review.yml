name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.MASTER_GITHUB_TOKEN }}

      - name: Install OpenCode
        run: bash .github/scripts/install-opencode.sh

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.MASTER_GITHUB_TOKEN }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          OPENCODE_PERMISSION: |
            {
              "bash": "allow",
              "edit": "deny",
              "write": "deny",
              "webfetch": "deny"
            }
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          pr_number=${{ github.event.pull_request.number }}
          prompt_file=$(mktemp)
          review_file=$(mktemp)
          cat > "$prompt_file" <<'EOF'
          You have Superpowers. Use them to review pull request #PR_NUMBER#.

          Review only the current pull request diff. Use repository context only when it is necessary to understand the diff.
          Do not request changes outside the scope of the pull request. Ask for follow-up issues instead.
          Use existing pull request comments and reviews as context when they are relevant to a re-review.

          Use GitHub CLI commands only to inspect the pull request. Do not submit the review yourself. Do not post issue comments. Do not post multiple reviews.

          Review requirements:
          1. Scope Control: reject out-of-scope changes and ask for follow-up issues instead.
          2. Re-review Behavior:
            - If this pull request was already reviewed before, focus on whether previously requested changes were resolved.
            - Do not restate the full prior review unless it is necessary.
            - Mention only newly found issues or confirm that previous issues are resolved.
            - Inspect the commit message for the commit being reviewed and determine whether it contains the exact trailer `By: coder`.
          3. Output:
            - Return only the final review body text that should be posted as a PR comment.
            - The first line must be `# REVIEW <sha>` using the actual reviewed commit SHA.
            - If the pull request is acceptable, include 1-2 short sentences and end with `LGTM`.
            - If changes are required, use a short numbered list of precise fixes.
            - Append `/coder fix this` only when changes are required and the reviewed commit includes the exact trailer `By: coder`.
            - Do not include markdown fences or any extra text before or after the final review body.
            - Do not describe your investigation, tool usage, reasoning, or intermediate findings.
            - Do not include preambles like "Let me", "I need to", "I found", or any analysis transcript.
            - Start your response immediately with `# REVIEW <sha>`.
          EOF
          perl -0pi -e 's/#PR_NUMBER#/'"$pr_number"'/g' "$prompt_file"
          opencode run -m ZCode/glm-5.1 "$(cat "$prompt_file")" > "$review_file"
          if [ -s "$review_file" ]; then
            gh pr comment "$pr_number" --body-file "$review_file"
          else
            echo "::warning::Review file was empty, skipping comment"
          fi
