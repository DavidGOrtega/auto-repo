name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  reviewer:
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/reviewer') &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Check PR source repository
        if: github.event_name == 'issue_comment'
        id: pr_source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          same_repo=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.repo.full_name == .base.repo.full_name')
          printf 'same_repo=%s\n' "$same_repo" >> "$GITHUB_OUTPUT"

      - name: Reject fork PR reviewer commands
        if: github.event_name == 'issue_comment' && steps.pr_source.outputs.same_repo != 'true'
        run: |
          printf '%s\n' 'Manual /reviewer is only supported for pull requests from branches in this repository.' >&2
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.MASTER_GITHUB_TOKEN }}
          
      - name: Restore OpenCode credentials
        env:
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.local/share/opencode"
          printf '%s' "$OPENCODE_AUTH_JSON" > "$HOME/.local/share/opencode/auth.json"
          chmod 600 "$HOME/.local/share/opencode/auth.json"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.MASTER_GITHUB_TOKEN }}
        with:
          model: github-copilot/claude-opus-4.6
          mentions: /reviewer
          use_github_token: true
          prompt: |
            You have Superpowers. Use them to review this pull request.

            Review only the current pull request diff. Use repository context only when it is necessary to understand the diff.
            Do not request changes outside the scope of the pull request. Ask for follow-up issues instead.
            Use existing pull request comments and reviews as context when they are relevant to a re-review.

            Review requirements:
            1. Scope Control: reject out-of-scope changes and ask for follow-up issues instead.
            2. Re-review Behavior:
              - If this pull request was already reviewed before, focus on whether previously requested changes were resolved.
              - Do not restate the full prior review unless it is necessary.
              - Mention only newly found issues or confirm that previous issues are resolved.
            3. Output:
              - Every review must start with a first line exactly in the form `# REVIEW <sha>` where `<sha>` is the commit being reviewed.
              - If changes are required, after the title write a short enumerated list of precise requested fixes and end with `/coder fix this`.
              - If the pull request is acceptable, after the title write at most two short sentences, do not use bullets, do not include cosmetic notes, and end with `LGTM`.
              - Keep the review concise and avoid repeating the full diff.
              - If you have already reviewed the pull request 5 times or more, stop and defer to another reviewer.
