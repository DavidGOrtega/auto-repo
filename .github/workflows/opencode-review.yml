name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore OpenCode credentials
        env:
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.local/share/opencode"
          printf '%s' "$OPENCODE_AUTH_JSON" > "$HOME/.local/share/opencode/auth.json"
          chmod 600 "$HOME/.local/share/opencode/auth.json"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.MASTER_GITHUB_TOKEN }}
        with:
          model: github-copilot/claude-opus-4.6
          use_github_token: true
          prompt: |
            You are a code review assistant.
            This repository ships the `superpowers` OpenCode plugin via `opencode.json`.
            Before doing anything else, use the `skill` tool to load `superpowers/requesting-code-review` and follow it for the review workflow.
            If that skill is unavailable or fails to load, continue with the repository-specific review requirements below.

            Review only the pull request diff and apply these requirements:
            1. Code Quality: confirm the code is clean and well-structured.
            2. Functionality: confirm the code works as intended and meets the requirements.
            3. Scope Control: reject modifications outside the pull request scope and ask for follow-up issues instead.
            4. Review Output:
              - If the code needs changes, write a precise enumerated list of every requested change and end the review with `/coder fix this`.
              - If the code does not need changes, say `LGTM` and do not request changes.
              - If you have already reviewed the pull request 5 times or more, stop and defer to another peer reviewer without asking for more changes.
