name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  reviewer:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.MASTER_GITHUB_TOKEN }}

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash
          
      - name: Restore OpenCode credentials
        env:
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.local/share/opencode"
          printf '%s' "$OPENCODE_AUTH_JSON" > "$HOME/.local/share/opencode/auth.json"
          chmod 600 "$HOME/.local/share/opencode/auth.json"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.MASTER_GITHUB_TOKEN }}
          OPENCODE_PERMISSION: |
            {
              "bash": {
                "*": "deny",
                "gh pr view *": "allow"
              },
              "webfetch": "deny"
            }
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          pr_number=${{ github.event.pull_request.number }}
          prompt_file=$(mktemp)
          review_file=$(mktemp)
          cat > "$prompt_file" <<'EOF'
          You have Superpowers. Use them to review pull request #PR_NUMBER#.

          Review only the current pull request diff. Use repository context only when it is necessary to understand the diff.
          Do not request changes outside the scope of the pull request. Ask for follow-up issues instead.
          Use existing pull request comments and reviews as context when they are relevant to a re-review.

          Use GitHub CLI commands only to inspect the pull request. Do not submit the review yourself. Do not post issue comments. Do not post multiple reviews.

          Review requirements:
          1. Scope Control: reject out-of-scope changes and ask for follow-up issues instead.
          2. Re-review Behavior:
            - If this pull request was already reviewed before, focus on whether previously requested changes were resolved.
            - Do not restate the full prior review unless it is necessary.
            - Mention only newly found issues or confirm that previous issues are resolved.
            - Before ending with `/coder fix this`, inspect the commit message for the commit being reviewed. Only include `/coder fix this` when that commit message contains the exact trailer `By: coder`.
          3. Output:
            - Every review must start with a first line exactly in the form `# REVIEW <sha>` where `<sha>` is the commit being reviewed.
            - If changes are required and the reviewed commit includes `By: coder`, after the title write a short enumerated list of precise requested fixes and end with `/coder fix this`.
            - If changes are required and the reviewed commit does not include `By: coder`, write the requested fixes but do not include `/coder fix this`.
            - If the pull request is acceptable, after the title write at most two short sentences, do not use bullets, do not include cosmetic notes, and end with `LGTM`.
            - Keep the review concise and avoid repeating the full diff.
            - If you have already reviewed the pull request 5 times or more, stop and defer to another reviewer.
            - Return only the final review body text. No markdown fences. No explanations before or after the review body.
          EOF
          perl -0pi -e 's/#PR_NUMBER#/'"$pr_number"'/g' "$prompt_file"
          opencode run --format json -m github-copilot/claude-opus-4.6 "$(cat "$prompt_file")" > "$review_file.json"
          ruby -rjson -e 'text = File.readlines(ARGV[0]).filter_map { |line| event = JSON.parse(line) rescue nil; part = event && event["part"]; part && part["type"] == "text" ? part["text"] : nil }.join("\n").strip; abort("No review text produced") if text.empty?; File.write(ARGV[1], text)' "$review_file.json" "$review_file"

          ruby -e 'text = File.read(ARGV[0]); lines = text.lines.map(&:chomp); abort("Review title missing") unless lines[0]&.match?(/^# REVIEW [0-9a-f]{7,40}$/); if text.rstrip.end_with?("LGTM"); body = lines[1..].reject { |line| line.strip.empty? }; abort("LGTM review must be concise") if body.length > 2; abort("LGTM review must not include /coder fix this") if text.include?("/coder fix this"); else numbered = lines[1..].reject { |line| line.strip.empty? }; abort("Change-request review must use enumerated list") unless numbered.all? { |line| line.match?(/^\d+\. /) || line == "/coder fix this" }; if text.include?("/coder fix this"); idx = numbered.index("/coder fix this"); abort("/coder fix this must be last") unless idx == numbered.length - 1; end; end' "$review_file"

          if [ "$(tail -n 1 "$review_file")" = "LGTM" ]; then
            gh pr review "$pr_number" --approve --body-file "$review_file"
          else
            gh pr review "$pr_number" --comment --body-file "$review_file"
          fi
