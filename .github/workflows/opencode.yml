name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  parse-invocation:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/coder') &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '/coder') &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '/coder') &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    outputs:
      timeout: ${{ steps.parse_timeout.outputs.timeout }}
    steps:
      - name: Parse per-invocation timeout
        id: parse_timeout
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            body=$(jq -r '.review.body // ""' "$GITHUB_EVENT_PATH")
          else
            body=$(jq -r '.comment.body // .pull_request.body // ""' "$GITHUB_EVENT_PATH")
          fi

          if printf '%s' "$body" | grep -qoE 'timeout[= ]+[0-9]+'; then
            value=$(printf '%s' "$body" | grep -oE 'timeout[= ]+[0-9]+' | grep -oE '[0-9]+' | head -1)
            printf 'timeout=%s\n' "$value" >> "$GITHUB_OUTPUT"
          fi

  coder:
    needs: parse-invocation
    if: needs.parse-invocation.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ needs.parse-invocation.outputs.timeout || 20 }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check PR source repository
        if: github.event.issue.pull_request || github.event.pull_request
        id: pr_source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number=${{ github.event.issue.number || github.event.pull_request.number }}
          same_repo=$(gh api repos/${{ github.repository }}/pulls/$pr_number --jq '.head.repo.full_name == .base.repo.full_name')
          printf 'same_repo=%s\n' "$same_repo" >> "$GITHUB_OUTPUT"

      - name: Reject fork PR coder commands
        if: (github.event.issue.pull_request || github.event.pull_request) && steps.pr_source.outputs.same_repo != 'true'
        run: |
          printf '%s\n' 'Manual /coder is only supported for pull requests from branches in this repository.' >&2
          exit 1

      - name: Resolve checkout ref
        id: checkout_ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.pull_request }}" ]; then
            printf 'ref=%s\n' "${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.issue.pull_request }}" ]; then
            pr_number="${{ github.event.issue.number }}"
            head_ref=$(gh api "repos/${{ github.repository }}/pulls/${pr_number}" --jq '.head.ref')
            printf 'ref=%s\n' "$head_ref" >> "$GITHUB_OUTPUT"
          else
            printf 'ref=%s\n' "${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.checkout_ref.outputs.ref }}
          fetch-depth: 0
          token: ${{ secrets.MASTER_GITHUB_TOKEN }}

      - name: Install OpenCode
        run: ./.github/scripts/install-opencode.sh

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure git hooks
        run: |
          # commit-msg hook: mark coder commits
          hook=.git/hooks/commit-msg
          printf '%s\n' '#!/bin/sh' > "$hook"
          printf '%s\n' 'msg_file="$1"' >> "$hook"
          printf '%s\n' 'if grep -qx "By: coder" "$msg_file"; then' >> "$hook"
          printf '%s\n' '  exit 0' >> "$hook"
          printf '%s\n' 'fi' >> "$hook"
          printf '%s\n' 'printf "\nBy: coder\n" >> "$msg_file"' >> "$hook"
          chmod +x "$hook"

          # pre-push hook: pull from origin before every push
          hook=.git/hooks/pre-push
          printf '%s\n' '#!/bin/sh' > "$hook"
          printf '%s\n' 'branch=$(git rev-parse --abbrev-ref HEAD)' >> "$hook"
          printf '%s\n' 'if [ "$branch" = "master" ] || [ "$branch" = "main" ]; then' >> "$hook"
          printf '%s\n' '  echo "ERROR: Direct pushes to $branch are not allowed. Create a feature branch first."' >> "$hook"
          printf '%s\n' '  exit 1' >> "$hook"
          printf '%s\n' 'fi' >> "$hook"
          printf '%s\n' 'if [ "$branch" != "HEAD" ]; then' >> "$hook"
          printf '%s\n' '  git fetch origin "$branch" 2>/dev/null || true' >> "$hook"
          printf '%s\n' '  remote_sha=$(git rev-parse "origin/$branch" 2>/dev/null || true)' >> "$hook"
          printf '%s\n' '  if [ -n "$remote_sha" ]; then' >> "$hook"
          printf '%s\n' '    local_sha=$(git rev-parse HEAD)' >> "$hook"
          printf '%s\n' '    if [ "$local_sha" != "$remote_sha" ]; then' >> "$hook"
          printf '%s\n' '      echo "Remote branch has new commits. Pulling origin/$branch..."' >> "$hook"
          printf '%s\n' '      if ! git pull --no-edit origin "$branch"; then' >> "$hook"
          printf '%s\n' '        echo "ERROR: Merge conflicts with origin/$branch. Resolve before pushing."' >> "$hook"
          printf '%s\n' '        exit 1' >> "$hook"
          printf '%s\n' '      fi' >> "$hook"
          printf '%s\n' '    fi' >> "$hook"
          printf '%s\n' '  fi' >> "$hook"
          printf '%s\n' 'fi' >> "$hook"
          printf '%s\n' 'exit 0' >> "$hook"
          chmod +x "$hook"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.MASTER_GITHUB_TOKEN }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        with:
          mentions: /coder
          use_github_token: true
          model: ZCode/glm-5.1
