name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  opencode:
    if: |
      (
        github.event_name == 'issue_comment' &&
        (
          contains(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, '/opencode')
        ) &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        (
          contains(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, '/opencode')
        ) &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        (
          contains(github.event.review.body, '/oc') ||
          contains(github.event.review.body, '/opencode')
        ) &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.MASTER_GITHUB_TOKEN }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Restore OpenCode credentials
        env:
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.local/share/opencode"
          printf '%s' "$OPENCODE_AUTH_JSON" > "$HOME/.local/share/opencode/auth.json"
          chmod 600 "$HOME/.local/share/opencode/auth.json"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        with:
          model: github-copilot/gpt-5.4
          prompt: |
            When you need to open a new pull request, create it as a draft first and only mark it ready for review after the implementation is complete.
            Once the work is finished and the branch is ready for review, explicitly move the pull request to ready-for-review status.
            If this run starts from a pull request comment or review, stay on that pull request and update the same pull request instead of opening a new one.
            If this run starts from an issue comment and there is already an open pull request linked to that issue, reuse the existing pull request instead of creating a new one.
            Only open a new pull request when no suitable existing pull request is already linked to the requested work.
          use_github_token: true
