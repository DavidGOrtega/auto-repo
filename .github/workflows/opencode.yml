name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  coder:
    if: |
      (
        github.event_name == 'issue_comment' &&
        (
          contains(github.event.comment.body, '/coder')
        ) &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        (
          contains(github.event.review.body, '/coder')
        ) &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        (
          contains(github.event.comment.body, '/coder')
        ) &&
        contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check PR source repository
        if: github.event.issue.pull_request || github.event.pull_request
        id: pr_source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number=${{ github.event.issue.number || github.event.pull_request.number }}
          same_repo=$(gh api repos/${{ github.repository }}/pulls/$pr_number --jq '.head.repo.full_name == .base.repo.full_name')
          printf 'same_repo=%s\n' "$same_repo" >> "$GITHUB_OUTPUT"

      - name: Reject fork PR coder commands
        if: (github.event.issue.pull_request || github.event.pull_request) && steps.pr_source.outputs.same_repo != 'true'
        run: |
          printf '%s\n' 'Manual /coder is only supported for pull requests from branches in this repository.' >&2
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.MASTER_GITHUB_TOKEN }}

      - name: Restore OpenCode credentials
        env:
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.local/share/opencode"
          printf '%s' "$OPENCODE_AUTH_JSON" > "$HOME/.local/share/opencode/auth.json"
          chmod 600 "$HOME/.local/share/opencode/auth.json"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Mark coder commits
        run: |
          hook=.git/hooks/commit-msg
          printf '%s\n' '#!/bin/sh' > "$hook"
          printf '%s\n' 'msg_file="$1"' >> "$hook"
          printf '%s\n' 'if grep -qx "By: coder" "$msg_file"; then' >> "$hook"
          printf '%s\n' '  exit 0' >> "$hook"
          printf '%s\n' 'fi' >> "$hook"
          printf '%s\n' 'printf "\nBy: coder\n" >> "$msg_file"' >> "$hook"
          chmod +x "$hook"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.MASTER_GITHUB_TOKEN }}
        with:
          model: github-copilot/gpt-5.4
          mentions: /coder
          use_github_token: true
